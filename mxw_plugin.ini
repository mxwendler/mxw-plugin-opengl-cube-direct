[mxw_plugin]                            ; must be here
plugin_version = 1                      ; must be V1
plugin_script_language = Python         ; must be Python
plugin_menu_level = development         ; disabled->invisible, development->in debug builds
plugin_media_scheme = generative                      ; media addressed as "generative://<payload>"
plugin_media_payload = cube_spin_opengl_direct        ; this plugin handles exactly "generative://cube_spin_opengl_direct"
plugin_media_create_uri = generative://cube_spin_opengl_direct ; media created by the 'Create' button
plugin_menu_parent = Media
plugin_menu_name = Spinning Cube (Direct)
plugin_grid_name = CubeGL
plugin_tooltip = Renders a spinning OpenGL cube directly into the media texture (no readback/upload). Address: generative://cube_spin_opengl_direct
